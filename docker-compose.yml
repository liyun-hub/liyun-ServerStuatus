version: "3.9"

services:
  server:
    build:
      context: ./server
    container_name: server-status-server
    environment:
      HTTP_ADDR: ":8080"
      DB_PATH: /app/data/server-status.db
      HEARTBEAT_TIMEOUT_SEC: "30"
      AGENT_TOKEN: ${AGENT_TOKEN}
    volumes:
      - server_data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  agent:
    build:
      context: ./agent
    container_name: server-status-agent
    depends_on:
      - server
    environment:
      SERVER_WS_URL: ws://server:8080/ws/agent
      NODE_ID: ${NODE_ID:-agent-1}
      HEARTBEAT_INTERVAL_SEC: "5"
      COLLECT_INTERVAL_SEC: "5"
      RECONNECT_WAIT_SEC: "3"
      AGENT_TOKEN: ${AGENT_TOKEN}
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8080}
    container_name: server-status-web
    depends_on:
      - server
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  server_data:
